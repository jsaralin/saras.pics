<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photo Album</title>
    <style>
        /* Reset and fill the entire screen */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Full-screen grid layout with no gaps */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            grid-gap: 0; 
            width: 100vw;
            flex-grow: 1;
        }

        /* Square photo containers */
        .photo-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            background-color: #111;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.2s ease-in-out;
        }

        /* Hover Effect: 50% Opacity */
        .photo-item:hover img {
            opacity: 0.5;
        }

        /* Zoom Overlay (Lightbox) */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        /* Active overlay class */
        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Zoomed image styling */
        .lightbox-overlay img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease-in-out;
        }

        .lightbox-overlay.active img {
            transform: scale(1);
        }

        /* Retro View Counter Styling */
        .counter-wrapper {
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            background-color: #000;
        }

        .retro-counter {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 14px;
            color: #00ff00; /* Classic neon green */
            background-color: #111;
            border: 2px inset #333;
            padding: 6px 12px;
            letter-spacing: 2px;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.15);
        }

        /* Mobile adjustments for slightly smaller grid boxes */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
        }
    </style>
</head>
<body>

    <!-- Full screen gallery container -->
    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- Hidden zoom pop-up overlay -->
    <div class="lightbox-overlay" id="lightbox" onclick="closeZoom()">
        <img id="lightboxImg" src="" alt="Zoomed View">
    </div>

    <!-- Retro View Counter Container -->
    <div class="counter-wrapper">
        <div class="retro-counter">
            VIEWS: <span id="count">000000</span>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. EDIT THIS NUMBER ONLY WHEN ADDING PHOTOS
        // ==========================================
        const totalPhotos = 50; 

        // Generates the numeric file list dynamically (1.jpg, 2.jpg, etc.)
        function generatePhotoList(count) {
            const list = [];
            for (let i = 1; i <= count; i++) {
                list.push(`${i}.jpeg`); 
            }
            return list;
        }

        // Randomizes the image grid placement order
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Builds and injects the grid items dynamically
        function initGallery() {
            const grid = document.getElementById("galleryGrid");
            const rawPhotoList = generatePhotoList(totalPhotos);
            const shuffled = shuffleArray(rawPhotoList);

            shuffled.forEach(src => {
                const item = document.createElement("div");
                item.className = "photo-item";
                item.onclick = () => openZoom(src);

                const img = document.createElement("img");
                img.src = src;
                img.alt = "Gallery Photo";

                item.appendChild(img);
                grid.appendChild(item);
            });
        }

        // Handle Zoom In / Zoom Out Functionality
        function openZoom(imageSrc) {
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightboxImg");
            
            lightboxImg.src = imageSrc;
            lightbox.classList.add("active");
        }

        function closeZoom() {
            const lightbox = document.getElementById("lightbox");
            lightbox.classList.remove("active");
        }

        // Fetches live data from CounterAPI and pads it to look like a rolling odometer
        function loadViews() {
            fetch(`https://api.counterapi.dev/v1/saras_pics/homepage/up`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('count').innerText = String(data.count).padStart(6, '0');
                })
                .catch(err => {
                    document.getElementById('count').innerText = "ONLINE";
                });
        }

        // Launches the gallery and hit counter simultaneously on load
        window.onload = function() {
            initGallery();
            loadViews();
        };
    </script>

</body>
</html>
