<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        /* Reset and fill the entire screen */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden;
        }

        /* Full-screen grid layout with no gaps */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            grid-gap: 0; 
            width: 100vw;
        }

        /* Square photo containers */
        .photo-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            background-color: #111;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.2s ease-in-out;
        }

        /* Hover Effect: 50% Opacity */
        .photo-item:hover img {
            opacity: 0.5;
        }

        /* Zoom Overlay (Lightbox) */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        /* Active overlay class */
        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Zoomed image styling */
        .lightbox-overlay img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease-in-out;
        }

        .lightbox-overlay.active img {
            transform: scale(1);
        }

        /* Mobile adjustments for slightly smaller grid boxes */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>

    <!-- Full screen gallery container -->
    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- Hidden zoom pop-up overlay -->
    <div class="lightbox-overlay" id="lightbox" onclick="closeZoom()">
        <img id="lightboxImg" src="" alt="Zoomed View">
    </div>

<script>
    // 1. Tell the code exactly how many photos you have uploaded
    const totalPhotos = 50; 

    // 2. This function automatically generates the list of image names (1.jpg, 2.jpg, etc.)
    function generatePhotoList(count) {
        const list = [];
        for (let i = 1; i <= count; i++) {
            // Change ".jpg" if your files use a different format like ".png"
            list.push(`${i}.jpg`); 
        }
        return list;
    }

    // 3. Randomizes the image order
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 4. Builds and injects the grid items dynamically
    function initGallery() {
        const grid = document.getElementById("galleryGrid");
        const rawPhotoList = generatePhotoList(totalPhotos);
        const shuffled = shuffleArray(rawPhotoList);

        shuffled.forEach(src => {
            const item = document.createElement("div");
            item.className = "photo-item";
            item.onclick = () => openZoom(src);

            const img = document.createElement("img");
            img.src = src;
            img.alt = "Gallery Photo";

            item.appendChild(img);
            grid.appendChild(item);
        });
    }

    // Handle Zoom In / Zoom Out Functionality
    function openZoom(imageSrc) {
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightboxImg");
        
        lightboxImg.src = imageSrc;
        lightbox.classList.add("active");
    }

    function closeZoom() {
        const lightbox = document.getElementById("lightbox");
        lightbox.classList.remove("active");
    }

    // Run the script on load
    window.onload = initGallery;
</script>


</body>
</html>
